name: Notify Site on Docs Update

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger site redeploy
        run: |
          curl -L -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CacheerPHP/cacheerphp.github.io/dispatches \
            -d '{"event_type":"docs-updated"}' \
          | grep -q "^204$" && echo "Dispatch sent (204)." || echo "Dispatch failed."
