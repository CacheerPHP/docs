name: Notify Site on Docs Update

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger site redeploy
        env:
          SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SITE_DISPATCH_TOKEN}" ]; then
            echo "::error::SITE_DISPATCH_TOKEN is not configured in the CacheerPHP/docs repository secrets."
            exit 1
          fi

          response_file="$(mktemp)"
          status_code="$(curl -L -sS -o "${response_file}" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${SITE_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CacheerPHP/cacheerphp.github.io/dispatches \
            -d '{"event_type":"docs-updated"}')"

          if [ "${status_code}" = "204" ]; then
            echo "Dispatch sent (204)."
            exit 0
          fi

          echo "::error::Dispatch failed with HTTP ${status_code}."

          if [ -s "${response_file}" ]; then
            echo "GitHub API response:"
            cat "${response_file}"
          fi

          exit 1
