name: Notify Site on Docs Update

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger site redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/CacheerPHP/cacheerphp.github.io/dispatches \
            -d '{"event_type":"docs-updated"}'
